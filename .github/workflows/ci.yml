name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test, typecheck, and package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.6.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build readable extension modules
        run: npm run build && node --input-type=module --eval 'await import("./dist/index.js")' && test -z "$(git status --porcelain --untracked-files=all -- dist)"

      - name: Verify package contents
        run: npm pack --dry-run
