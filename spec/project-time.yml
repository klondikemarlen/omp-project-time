feature: project-time
status: stable
requirements:
  - id: prompt_driven_activity
    title: Prompt-driven activity
    requirement: Only a real user prompt to a top-level agent session starts or extends Project Time tracking.
    rationale: Passive UI refreshes, subagents, and artifact sessions must not create project time cost.
  - id: active_window
    title: Five-minute activity window
    requirement: A session is active only while the user has sent at least one prompt within the last activeWindowMinutes.
    default: 5 minutes
    rationale: Project Time represents active collaboration time, not idle terminal time.
  - id: continuous_accrual
    title: Continuous active-time accrual
    requirement: While active, cost accrues continuously according to elapsed active milliseconds, not only after full five-minute windows.
    formula: monthlySalary * 12 / (hoursPerWeek * weeksPerYear * 60 * 60 * 1000) * activeMilliseconds
    rationale: The UI refresh should show the cost earned during the elapsed active interval.
  - id: ui_refresh_interval
    title: Configurable UI refresh
    requirement: The status UI refreshes every refreshIntervalSeconds while the session is active.
    default: 15 seconds
    example: With the default rate, each 15-second active refresh adds about 0.16 before formatting.
    rationale: refreshIntervalSeconds controls display cadence; it is not the billing window size.
  - id: precise_storage
    title: Precise persisted storage
    requirement: Store tracked values as decimal strings produced from Big.js arithmetic, and format them only at the UI boundary.
    rationale: Avoid floating-point drift and avoid coupling persisted values to display formatting or rounding.
  - id: cad_locale_format
    title: Configurable CAD locale formatting
    requirement: Format every displayed CAD amount with one Intl.NumberFormat formatter using a configured BCP 47 locale; default to en-CA and validate that the runtime supports the locale.
    rationale: Presentation follows regional monetary conventions without adding currency metadata, conversion, or rounding to persisted tracking values.
  - id: local_data_reset
    title: Local data reset
    requirement: On the first startup after a major tracking-data change, delete legacy Project Time and developer-cost ledger data; write a local schema marker so later starts retain new records.
    rationale: This single-owner plugin intentionally discards incompatible local history instead of converting or preserving it.
  - id: session_scope
    title: Session-scoped meter
    requirement: Track and persist cost by top-level session id; resuming the same session continues its meter.
    rationale: Each top-level session should preserve its own Project Time total.
  - id: top_level_only
    title: Top-level sessions only
    requirement: Subagent and artifact sessions must not create or display their own Project Time meter.
    rationale: Subagent work is driven by the top-level user prompt and should not double-count developer activity.
  - id: attention_metrics
    title: Persisted developer attention metrics
    requirement: Persist prompt count and active milliseconds for each top-level session, and expose Project Time cost, active time, prompt count, last prompt age/time, and session id through the summary command.
    rationale: Cost alone does not show how much human steering a hands-off session consumed.
  - id: spread_billing
    title: Multi-session spread billing
    requirement: Divide each elapsed active-cost interval equally across every simultaneously active top-level session, including sessions in independent plugin runners.
    persistence: Keep shared settled session state so resumed sessions cannot double-count or lose prior overlap intervals.
    rationale: One developer cannot spend the same real-world time at full cost in multiple sessions simultaneously.
  - id: local_project_time_log
    title: Local project time log
    requirement: Automatically record top-level developer-attention intervals for the active Git repository, deduplicate persisted interval sources, and refresh local 5-, 10-, and 15-minute date/repository summary artifacts without user commands.
    rationale: Repository attribution should run in the background while preserving simultaneous project allocation and wall-clock totals.
  - id: time_log_privacy
    title: Time log privacy boundary
    requirement: Resolve Git repository identity transiently, persist only a sanitized project label and one-way repository hash, and do not persist working-directory paths, raw remote URLs, credentials, prompts, assignments, transcripts, tool output, artifacts, session files, or model metadata.
    rationale: Automatic attribution must not turn local source-control metadata into sensitive activity logging.
  - id: billable_clocks
    title: Separate billable attention and AI clocks
    requirement: For an opted-in default client policy or configured GitHub repository-client mapping, record one fixed five-minute human-attention token and one exact AI interval for each top-level prompt. Attribute each record to the active repository and its configured-or-derived project name; snapshot project and rate in separate append-only ledgers, derive scalar totals with decimal arithmetic, and format them only in summaries.
    rationale: Human attention and AI runtime are separate billable observations with different rates; project attribution remains provider-neutral and persisted records contain no monetary metadata.
  - id: billable_categories
    title: Provider-neutral billable categories
    requirement: Allow a configured repository category ID and label to be snapshotted on new billable attention-token and AI-interval records, and preserve category attribution in summaries and previews.
    rationale: Local category attribution lets a later exporter map work to its own task model without coupling Project Time to an external provider.
  - id: billable_clock_privacy
    title: Billable clock privacy boundary
    requirement: Do not persist raw prompt text, transcripts, tool output, artifacts, model metadata, or credentials in billable records.
    rationale: Billing records need only attribution, timing, and snapshotted policy data.
  - id: local_project_history
    title: Local project tracking history
    requirement: The history command must display the current Git project, settled developer meter, and recent automatic developer-time intervals and billable records filtered to that repository; it must distinguish disabled billable tracking from zero recorded entries and use only local ledgers.
    rationale: Users need a quick local confirmation of current-project tracking before they export or reconcile records elsewhere.
non_requirements:
  - id: no_model_cost_replacement
    description: This plugin does not replace OMP model/tool usage cost; it adds developer-time cost.
  - id: no_inline_status_until_omp_support
    description: Current OMP plugin status uses ctx.ui.setStatus and renders on the hook-status line unless OMP adds plugin-defined inline status segments.
  - id: no_inferred_corrections
    description: This plugin does not infer corrections, nudges, or outcomes from prompts; reliable correction telemetry requires richer OMP core signals.
  - id: no_inferred_billable_categories
    description: This plugin does not infer billable categories from prompts, agents, files, or issue text; categories require an explicit repository configuration.
